name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    permissions:
      contents: read
      actions: none

    steps:
      - name: Pull latest code from main
        run: |
          set -e
          cd /var/www/Mugen-Porta
          echo "Current user: $(whoami)"
          echo "Git remote: $(git remote -v)"
          git fetch origin main
          git reset --hard origin/main
          git clean -fd
          echo "Git log after pull:"
          git log --oneline -3

      - name: Verify file updated
        run: |
          echo "=== Overview.js content check ==="
          grep -n "AY 20\|Y2[2-6]" "/var/www/Mugen-Porta/my-app/src/app/(pages)/auth/register/steps/Overview.js"
          echo "=== If you see AY 2025 above, git pull failed ==="
          echo "=== If you see AY 2026 above, git pull worked ==="

      - name: Install dependencies
        run: |
          cd /var/www/Mugen-Porta/my-app
          npm install

      - name: Clean old build
        run: |
          cd /var/www/Mugen-Porta/my-app
          rm -rf .next

      - name: Build app
        run: |
          cd /var/www/Mugen-Porta/my-app
          npm run build

      - name: Restart PM2
        run: |
          cd /var/www/Mugen-Porta/my-app
          pm2 restart mugen || pm2 start npm --name "mugen" -- start
          pm2 save
