name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    permissions:
      contents: read
      actions: none

    steps:
      - name: Pull latest code from main
        run: |
          set -e
          cd /var/www/Mugen-Porta
          git fetch origin main
          git reset --hard origin/main
          git clean -fd

      - name: Install dependencies
        run: |
          cd /var/www/Mugen-Porta/my-app
          npm install

      - name: Clean old build
        run: |
          cd /var/www/Mugen-Porta/my-app
          rm -rf .next

      - name: Build app
        run: |
          cd /var/www/Mugen-Porta/my-app
          npm run build

      - name: Restart PM2
        run: |
          cd /var/www/Mugen-Porta/my-app
          pm2 restart sac 2>/dev/null || true
          pm2 restart portal 2>/dev/null || true
          pm2 restart mugen 2>/dev/null || pm2 start npm --name "mugen" -- start
          pm2 save
