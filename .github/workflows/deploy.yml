name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    permissions:
      contents: read
      actions: none

    steps:
      - name: Pull latest code from main
        run: |
          cd /var/www/Mugen-Porta
          git fetch origin main
          git reset --hard origin/main
          git clean -fd

      - name: Verify file updated
        run: |
          echo "=== Git log (last 3) ==="
          cd /var/www/Mugen-Porta
          git log --oneline -3
          echo "=== Overview.js content check ==="
          grep -n "AY 20" /var/www/Mugen-Porta/my-app/src/app/\(pages\)/auth/register/steps/Overview.js

      - name: Install dependencies
        run: |
          cd /var/www/Mugen-Porta/my-app
          npm install

      - name: Clean old build
        run: |
          cd /var/www/Mugen-Porta/my-app
          rm -rf .next

      - name: Build app
        run: |
          cd /var/www/Mugen-Porta/my-app
          npm run build

      - name: Restart PM2
        run: |
          cd /var/www/Mugen-Porta/my-app
          pm2 restart mugen || pm2 start npm --name "mugen" -- start
          pm2 save
